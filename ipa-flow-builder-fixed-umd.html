<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>IPA Flow Builder (UMD fix)</title>

  <!-- Styles -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/reactflow@11.11.4/dist/style.min.css" />

  <!-- React 18 UMD -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>

  <!-- React Flow v11 UMD -->
  <script src="https://cdn.jsdelivr.net/npm/reactflow@11.11.4/dist/umd/index.min.js"></script>

  <!-- Export libs -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.2/jspdf.umd.min.js"></script>

  <style>
    html, body, #root { height: 100%; margin: 0; }
    body { font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif; background: #f8fafc; }
  </style>
</head>
<body>
<div id="root"></div>

<script>
(function () {
  function getReactFlowGlobal() {
    return window.ReactFlow || window.reactflow || window.ReactFlowRenderer || (window.ReactFlow && window.ReactFlow.default);
  }

  function mustHaveGlobals() {
    return !!(window.React && window.ReactDOM && getReactFlowGlobal() && window.html2canvas && window.jspdf);
  }

  function boot() {
    if (!mustHaveGlobals()) {
      document.getElementById('root').innerHTML = '<div style="padding:16px;color:#b91c1c">React Flow loaded but no compatible UMD global was detected.</div>';
      console.error('Globals detected:', Object.keys(window));
      return;
    }

    const React = window.React;
    const ReactDOM = window.ReactDOM;
    const RF = getReactFlowGlobal();

    const ReactFlow = RF.default || RF;
    const { addEdge, MiniMap, Controls, Background, Handle, Position, ReactFlowProvider, useNodesState, useEdgesState } = RF;

    const h = React.createElement;

    function App() {
      const [nodes, , onNodesChange] = useNodesState([
        { id: '1', position: { x: 100, y: 100 }, data: { label: 'Start' } },
        { id: '2', position: { x: 300, y: 100 }, data: { label: 'End' } }
      ]);
      const [edges, setEdges, onEdgesChange] = useEdgesState([
        { id: 'e1-2', source: '1', target: '2', type: 'smoothstep' }
      ]);

      const onConnect = params => setEdges(eds => addEdge(params, eds));

      return h('div', { style: { height: '100vh' } },
        h(ReactFlow, {
          nodes,
          edges,
          onNodesChange,
          onEdgesChange,
          onConnect,
          fitView: true
        },
          h(MiniMap),
          h(Controls),
          h(Background)
        )
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(
      h(ReactFlowProvider, null, h(App))
    );
  }

  window.addEventListener('load', boot);
})();
</script>
</body>
</html>
