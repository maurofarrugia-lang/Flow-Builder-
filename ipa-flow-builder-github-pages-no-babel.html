<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>IPA Flow Builder (GitHub Pages • No Babel)</title>

  <!-- React Flow v11 UMD + stylesheet (static hosting friendly). -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/reactflow@11.11.4/dist/style.min.css" />

  <!-- React 18 UMD -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>

  <!-- React Flow v11 UMD bundle -->
  <script src="https://cdn.jsdelivr.net/npm/reactflow@11.11.4/dist/umd/index.min.js"></script>

  <!-- html2canvas for PNG/PDF capture -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

  <!-- jsPDF UMD (use window.jspdf.jsPDF) -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.2/jspdf.umd.min.js"></script>

  <style>
    :root {
      --bg: #f8fafc;
      --panel: #ffffff;
      --border: #e5e7eb;
      --text: #0f172a;
      --muted: #64748b;
      --shadow: 0 10px 25px rgba(2, 6, 23, .08);
      --radius: 18px;
    }
    html, body { height: 100%; }
    body {
      margin: 0;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    .app { height: 100vh; display: grid; grid-template-rows: auto 1fr; gap: 10px; padding: 12px; box-sizing: border-box; }

    .topbar {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 12px 14px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      flex-wrap: wrap;
    }
    .title h1 { font-size: 18px; margin: 0; }
    .title p { font-size: 13px; margin: 4px 0 0 0; color: var(--muted); }

    .btnrow { display: flex; flex-wrap: wrap; gap: 8px; align-items: center; }

    .btn {
      appearance: none;
      border: 1px solid var(--border);
      background: #fff;
      color: var(--text);
      border-radius: 12px;
      padding: 8px 10px;
      font-size: 13px;
      cursor: pointer;
      transition: .12s ease;
      user-select: none;
      line-height: 1;
    }
    .btn:hover { background: #f1f5f9; }
    .btn.primary { background: #0f172a; color: #fff; border-color: #0f172a; }
    .btn.primary:hover { background: #111c33; }
    .btn.danger { background: #fff; color: #b91c1c; border-color: #fecaca; }
    .btn.danger:hover { background: #fff1f2; }
    .btn[disabled] { opacity: .5; cursor: not-allowed; }

    .layout { height: 100%; display: grid; grid-template-columns: 360px 1fr; gap: 10px; }
    @media (max-width: 1100px) { .layout { grid-template-columns: 1fr; grid-template-rows: auto 1fr; } }

    .left {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 12px;
      overflow: auto;
    }

    .section { border: 1px solid var(--border); border-radius: 16px; padding: 12px; }
    .section + .section { margin-top: 10px; }

    .section h3 { margin: 0; font-size: 14px; }
    .section .hint { margin-top: 4px; font-size: 12px; color: var(--muted); }

    textarea {
      margin-top: 10px;
      width: 100%;
      height: 140px;
      resize: vertical;
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 10px;
      font-size: 13px;
      background: #f8fafc;
      box-sizing: border-box;
      outline: none;
    }

    .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 10px; }
    .grid3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-top: 10px; }

    .right {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      overflow: hidden;
      min-height: 420px;
      position: relative;
    }
    .canvasWrap { height: 100%; width: 100%; }

    /* IPA node styles */
    .ipa-node {
      border: 1px solid #cbd5e1;
      border-radius: 16px;
      padding: 10px 12px;
      min-width: 160px;
      background: #fff;
      box-shadow: 0 2px 10px rgba(2,6,23,.06);
    }
    .ipa-node.selected { outline: 3px solid rgba(15,23,42,.10); }
    .ipa-node .kind {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: .06em;
      color: rgba(15,23,42,.65);
      font-weight: 600;
    }
    .ipa-node .label { font-size: 14px; font-weight: 700; margin-top: 4px; cursor: default; }

    .k-start { background: #ecfdf5; border-color: #6ee7b7; color: #064e3b; border-radius: 999px; }
    .k-end { background: #fff1f2; border-color: #fda4af; color: #881337; border-radius: 999px; }
    .k-interview { background: #f0fdfa; border-color: #5eead4; color: #134e4a; }
    .k-appeal { background: #fffbeb; border-color: #fcd34d; color: #78350f; }
    .k-decision { background: #eef2ff; border-color: #a5b4fc; color: #312e81; }

    .decision-wrap {
      transform: rotate(45deg);
      width: 180px;
      height: 100px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .decision-inner { transform: rotate(-45deg); width: 100%; }

    .editInput {
      margin-top: 6px;
      width: 100%;
      border: 1px solid #cbd5e1;
      border-radius: 10px;
      padding: 6px 8px;
      font-size: 13px;
      outline: none;
      background: rgba(255,255,255,.75);
      box-sizing: border-box;
    }
    .tiny { font-size: 11px; color: var(--muted); margin-top: 6px; }

    /* Hide React Flow attribution */
    .react-flow__attribution { display: none; }

    @media print {
      .topbar, .left { display: none !important; }
      .layout { grid-template-columns: 1fr !important; }
      body { background: #fff; }
      .right { box-shadow: none; border: none; }
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script>
    (function () {
      function mustHaveGlobals() {
        return window.React && window.ReactDOM && window.ReactFlow && window.html2canvas && window.jspdf;
      }

      function boot() {
        if (!mustHaveGlobals()) {
          console.error('Missing globals. Check CDN script loading.', {
            React: !!window.React,
            ReactDOM: !!window.ReactDOM,
            ReactFlow: !!window.ReactFlow,
            html2canvas: !!window.html2canvas,
            jspdf: !!window.jspdf,
          });
          document.getElementById('root').innerHTML = '<div style="padding:16px;font-family:system-ui;color:#b91c1c">Failed to load required libraries from CDN. Please check your network / firewall.</div>';
          return;
        }

        var React = window.React;
        var ReactDOM = window.ReactDOM;
        var RF = window.ReactFlow;

        // Defensive UMD extraction
        var ReactFlowComp = RF.default || RF.ReactFlow || RF;
        var addEdge = RF.addEdge;
        var MiniMap = RF.MiniMap;
        var Controls = RF.Controls;
        var Background = RF.Background;
        var Handle = RF.Handle;
        var Position = RF.Position;
        var ReactFlowProvider = RF.ReactFlowProvider;
        var useNodesState = RF.useNodesState;
        var useEdgesState = RF.useEdgesState;
        var useReactFlow = RF.useReactFlow;

        // jsPDF from UMD: window.jspdf.jsPDF
        var jsPDF = window.jspdf && window.jspdf.jsPDF;

        var h = React.createElement;

        var kindTheme = {
          start: 'k-start',
          end: 'k-end',
          process: '',
          interview: 'k-interview',
          decision: 'k-decision',
          appeal: 'k-appeal',
        };

        function inferKind(label) {
          var l = String(label || '').toLowerCase();
          if (l === 'start' || l.indexOf('start') === 0) return 'start';
          if (l === 'end' || l.indexOf('end') === 0) return 'end';
          if (l.indexOf('interview') >= 0) return 'interview';
          if (l.indexOf('appeal') >= 0) return 'appeal';
          if (l.indexOf('decision') >= 0 || l.indexOf('approve') >= 0 || l.indexOf('refuse') >= 0) return 'decision';
          return 'process';
        }

        function cx() {
          var out = [];
          for (var i = 0; i < arguments.length; i++) {
            if (arguments[i]) out.push(arguments[i]);
          }
          return out.join(' ');
        }

        function IpaNode(props) {
          var id = props.id;
          var data = props.data || {};
          var selected = props.selected;
          var isConnectable = props.isConnectable;

          var kind = data.kind || 'process';
          var label = data.label || 'Untitled';
          var editable = !!data.editable;
          var onLabelChange = data.onLabelChange;

          var _a = React.useState(false), editing = _a[0], setEditing = _a[1];
          var _b = React.useState(label), draft = _b[0], setDraft = _b[1];

          React.useEffect(function () { setDraft(label); }, [label]);

          var nodeCls = cx('ipa-node', kindTheme[kind] || '', selected ? 'selected' : '');

          var content = h(
            'div',
            { className: nodeCls },
            h(Handle, { type: 'target', position: Position.Left, isConnectable: isConnectable && editable }),
            h(Handle, { type: 'source', position: Position.Right, isConnectable: isConnectable && editable }),
            h('div', { className: 'kind' }, kind),
            !editing
              ? h(
                  'div',
                  {
                    className: 'label',
                    onDoubleClick: function () { if (editable) setEditing(true); },
                    title: editable ? 'Double-click to edit' : 'Read-only',
                  },
                  label
                )
              : h(
                  'div',
                  null,
                  h('input', {
                    className: 'editInput nodrag',
                    value: draft,
                    autoFocus: true,
                    onChange: function (e) { setDraft(e.target.value); },
                    onKeyDown: function (e) {
                      if (e.key === 'Enter') {
                        setEditing(false);
                        if (onLabelChange) onLabelChange(id, (draft || '').trim() || 'Untitled');
                      }
                      if (e.key === 'Escape') {
                        setEditing(false);
                        setDraft(label);
                      }
                    },
                    onBlur: function () {
                      setEditing(false);
                      if (onLabelChange) onLabelChange(id, (draft || '').trim() || 'Untitled');
                    },
                  }),
                  h('div', { className: 'tiny' }, 'Enter to save • Esc to cancel')
                )
          );

          if (kind === 'decision') {
            return h('div', { className: 'decision-wrap' }, h('div', { className: 'decision-inner' }, content));
          }

          return content;
        }

        var nodeTypes = { ipa: IpaNode };

        function parseTextToFlow(text) {
          var lines = String(text || '')
            .split(/\r?\n/)
            .map(function (l) { return l.trim(); })
            .filter(Boolean);

          var nodesByLabel = new Map();
          var edges = [];

          function ensureNode(label) {
            if (nodesByLabel.has(label)) return nodesByLabel.get(label);
            var id = String(nodesByLabel.size + 1);
            var node = {
              id: id,
              type: 'ipa',
              position: { x: 0, y: 0 },
              data: { label: label, kind: inferKind(label) },
            };
            nodesByLabel.set(label, node);
            return node;
          }

          lines.forEach(function (line, row) {
            var parts = line.split(/\s*->\s*/).map(function (p) { return p.trim(); }).filter(Boolean);
            for (var i = 0; i < parts.length; i++) {
              ensureNode(parts[i]);
              if (i > 0) {
                var a = ensureNode(parts[i - 1]);
                var b = ensureNode(parts[i]);
                edges.push({ id: 'e' + a.id + '-' + b.id + '-' + row + '-' + i, source: a.id, target: b.id, type: 'smoothstep' });
              }
            }
          });

          var nodes = Array.from(nodesByLabel.values());
          var level = new Map(nodes.map(function (n) { return [n.id, 0]; }));

          for (var k = 0; k < 10; k++) {
            edges.forEach(function (e) {
              var l1 = level.get(e.source) || 0;
              var l2 = level.get(e.target) || 0;
              if (l2 < l1 + 1) level.set(e.target, l1 + 1);
            });
          }

          var columns = new Map();
          nodes.forEach(function (n) {
            var l = level.get(n.id) || 0;
            if (!columns.has(l)) columns.set(l, []);
            columns.get(l).push(n);
          });

          var colGap = 260;
          var rowGap = 120;
          Array.from(columns.entries()).forEach(function (entry) {
            var col = entry[0];
            var colNodes = entry[1];
            colNodes.forEach(function (n, idx) {
              n.position = { x: col * colGap + 40, y: idx * rowGap + 60 };
            });
          });

          return { nodes: nodes, edges: edges };
        }

        function downloadURL(url, filename) {
          var a = document.createElement('a');
          a.href = url;
          a.download = filename;
          document.body.appendChild(a);
          a.click();
          a.remove();
        }

        function downloadBlob(blob, filename) {
          var url = URL.createObjectURL(blob);
          downloadURL(url, filename);
          setTimeout(function () { URL.revokeObjectURL(url); }, 2000);
        }

        function encodeSharePayload(payload) {
          // UTF-8 safe base64
          return btoa(unescape(encodeURIComponent(JSON.stringify(payload))));
        }

        function decodeSharePayload(encoded) {
          var decoded = decodeURIComponent(escape(atob(encoded)));
          return JSON.parse(decoded);
        }

        function App() {
          var _edit = React.useState(true), editable = _edit[0], setEditable = _edit[1];
          var _text = React.useState('Start -> Registration -> Interview -> Decision\nDecision -> Appeal\nDecision -> End'), builderText = _text[0], setBuilderText = _text[1];

          var rf = useReactFlow();

          function readFromHash() {
            var hash = location.hash || '';
            var m = hash.match(/flow=([^&]+)/);
            if (!m) return null;
            try {
              var data = decodeSharePayload(m[1]);
              if (data && data.nodes && data.edges) return { nodes: data.nodes, edges: data.edges };
            } catch (e) {}
            return null;
          }

          function readFromLocal() {
            try {
              var raw = localStorage.getItem('ipaFlowState');
              if (!raw) return null;
              var data = JSON.parse(raw);
              if (data && data.nodes && data.edges) return data;
            } catch (e) {}
            return null;
          }

          var initial = React.useMemo(function () {
            return readFromHash() || readFromLocal() || parseTextToFlow(builderText);
          }, []);

          var _nodes = useNodesState(initial.nodes), nodes = _nodes[0], setNodes = _nodes[1], onNodesChange = _nodes[2];
          var _edges = useEdgesState(initial.edges), edges = _edges[0], setEdges = _edges[1], onEdgesChange = _edges[2];

          var _sel = React.useState(null), selectedNodeId = _sel[0], setSelectedNodeId = _sel[1];

          // Inject callbacks into node data
          React.useEffect(function () {
            setNodes(function (nds) {
              return nds.map(function (n) {
                return {
                  id: n.id,
                  type: 'ipa',
                  position: n.position,
                  data: Object.assign({}, n.data, {
                    editable: editable,
                    onLabelChange: function (id, newLabel) {
                      setNodes(function (curr) {
                        return curr.map(function (x) {
                          return x.id === id ? Object.assign({}, x, { data: Object.assign({}, x.data, { label: newLabel }) }) : x;
                        });
                      });
                    },
                  }),
                };
              });
            });
          }, [editable]);

          // Auto-save (debounced)
          React.useEffect(function () {
            var t = setTimeout(function () {
              try {
                localStorage.setItem('ipaFlowState', JSON.stringify({ nodes: rf.getNodes(), edges: rf.getEdges() }));
              } catch (e) {}
            }, 250);
            return function () { clearTimeout(t); };
          }, [nodes, edges]);

          var onConnect = React.useCallback(function (params) {
            setEdges(function (eds) { return addEdge(Object.assign({}, params, { type: 'smoothstep' }), eds); });
          }, []);

          var onSelectionChange = React.useCallback(function (sel) {
            var n = sel && sel.nodes && sel.nodes[0];
            setSelectedNodeId(n ? n.id : null);
          }, []);

          function buildFromText() {
            var built = parseTextToFlow(builderText);
            setNodes(built.nodes);
            setEdges(built.edges);
            setTimeout(function () { rf.fitView({ padding: 0.25, duration: 200 }); }, 30);
          }

          function addNode(kind) {
            var id = String(Date.now());
            var label =
              kind === 'decision' ? 'Decision' :
              kind === 'interview' ? 'Interview' :
              kind === 'appeal' ? 'Appeal' :
              kind === 'start' ? 'Start' :
              kind === 'end' ? 'End' :
              'Process';

            setNodes(function (nds) {
              return nds.concat([{ id: id, type: 'ipa', position: { x: 80, y: 80 + nds.length * 80 }, data: { label: label, kind: kind } }]);
            });
          }

          function setKindForSelected(kind) {
            if (!selectedNodeId) return;
            setNodes(function (nds) {
              return nds.map(function (n) {
                return n.id === selectedNodeId ? Object.assign({}, n, { data: Object.assign({}, n.data, { kind: kind }) }) : n;
              });
            });
          }

          function deleteSelected() {
            if (!selectedNodeId) return;
            setNodes(function (nds) { return nds.filter(function (n) { return n.id !== selectedNodeId; }); });
            setEdges(function (eds) { return eds.filter(function (e) { return e.source !== selectedNodeId && e.target !== selectedNodeId; }); });
            setSelectedNodeId(null);
          }

          function exportJSON() {
            var payload = {
              version: 1,
              createdAt: new Date().toISOString(),
              nodes: rf.getNodes(),
              edges: rf.getEdges(),
            };
            downloadBlob(new Blob([JSON.stringify(payload, null, 2)], { type: 'application/json' }), 'ipa-flow.json');
          }

          function importJSONFile(file) {
            if (!file) return;
            var reader = new FileReader();
            reader.onload = function () {
              try {
                var data = JSON.parse(String(reader.result || ''));
                if (data && data.nodes && data.edges) {
                  setNodes(data.nodes);
                  setEdges(data.edges);
                  setTimeout(function () { rf.fitView({ padding: 0.25, duration: 200 }); }, 30);
                }
              } catch (e) {
                alert('Invalid JSON file.');
              }
            };
            reader.readAsText(file);
          }

          function copyShareLink() {
            var payload = { v: 1, nodes: rf.getNodes(), edges: rf.getEdges() };
            var encoded = encodeSharePayload(payload);
            var url = location.origin + location.pathname + '#flow=' + encoded;
            if (navigator.clipboard && navigator.clipboard.writeText) {
              navigator.clipboard.writeText(url);
            } else {
              prompt('Copy link:', url);
            }
          }

          function resetAll() {
            try { localStorage.removeItem('ipaFlowState'); } catch (e) {}
            location.hash = '';
            location.reload();
          }

          function exportPNG() {
            var root = document.querySelector('.right');
            if (!root) return;
            rf.fitView({ padding: 0.25, duration: 0 });
            requestAnimationFrame(function () {
              window.html2canvas(root, { backgroundColor: '#ffffff', scale: 2 }).then(function (canvas) {
                downloadURL(canvas.toDataURL('image/png'), 'ipa-flow.png');
              });
            });
          }

          function exportPDF() {
            if (!jsPDF) {
              alert('jsPDF not available.');
              return;
            }
            var root = document.querySelector('.right');
            if (!root) return;

            rf.fitView({ padding: 0.25, duration: 0 });
            requestAnimationFrame(function () {
              window.html2canvas(root, { backgroundColor: '#ffffff', scale: 2 }).then(function (canvas) {
                var imgData = canvas.toDataURL('image/png');
                var pdf = new jsPDF({ orientation: 'landscape', unit: 'mm', format: 'a4' });
                var pageW = pdf.internal.pageSize.getWidth();
                var pageH = pdf.internal.pageSize.getHeight();

                pdf.setFillColor(245, 247, 250);
                pdf.rect(0, 0, pageW, 18, 'F');
                pdf.setTextColor(15, 23, 42);
                pdf.setFontSize(11);
                pdf.text('IPA Flow Diagram (Export)', 10, 11);
                pdf.setFontSize(9);
                pdf.setTextColor(71, 85, 105);
                pdf.text(new Date().toLocaleString(), pageW - 10, 11, { align: 'right' });

                var margin = 8;
                var imgX = margin;
                var imgY = 22;
                var imgW = pageW - margin * 2;
                var imgH = pageH - imgY - margin;

                pdf.addImage(imgData, 'PNG', imgX, imgY, imgW, imgH);
                pdf.save('ipa-flow.pdf');
              });
            });
          }

          // UI helpers
          function button(label, className, onClick, disabled) {
            return h('button', { className: className, onClick: onClick, disabled: disabled }, label);
          }

          // Import label with hidden file input
          function importButton() {
            return h(
              'label',
              { className: 'btn', style: { display: 'inline-flex', alignItems: 'center', gap: 8 } },
              'Import JSON',
              h('input', {
                type: 'file',
                accept: 'application/json',
                style: { display: 'none' },
                onChange: function (e) {
                  var f = e.target.files && e.target.files[0];
                  importJSONFile(f);
                  e.target.value = '';
                },
              })
            );
          }

          return h(
            'div',
            { className: 'app' },

            h(
              'div',
              { className: 'topbar' },
              h(
                'div',
                { className: 'title' },
                h('h1', null, 'IPA Flow Builder (No Babel • GitHub Pages)'),
                h('p', null, 'Text → Flow • IPA nodes • Read-only mode • Export PNG/PDF • Share link • Import/Export JSON • Autosave')
              ),
              h(
                'div',
                { className: 'btnrow' },
                button(editable ? 'Editing: ON' : 'Read-only', cx('btn', editable ? 'primary' : ''), function () { setEditable(function (v) { return !v; }); }),
                button('Export PNG', 'btn', exportPNG),
                button('Export PDF', 'btn', exportPDF),
                button('Export JSON', 'btn', exportJSON),
                importButton(),
                button('Copy Share Link', 'btn', copyShareLink)
              )
            ),

            h(
              'div',
              { className: 'layout' },

              h(
                'div',
                { className: 'left' },

                h(
                  'div',
                  { className: 'section' },
                  h('h3', null, '🧠 Text → Flow auto-builder'),
                  h('div', { className: 'hint' }, 'One line per path. Use “->” between steps. Repeat a start node for branches.'),
                  h('textarea', {
                    value: builderText,
                    onChange: function (e) { setBuilderText(e.target.value); },
                  }),
                  h(
                    'div',
                    { className: 'btnrow' },
                    button('Build', 'btn primary', buildFromText),
                    button('Reset', 'btn', resetAll)
                  ),
                  h('div', { className: 'tiny' }, 'Tip: words like Interview/Decision/Appeal auto-style nodes.')
                ),

                h(
                  'div',
                  { className: 'section' },
                  h('h3', null, '🏷 IPA-styled node palette'),
                  h(
                    'div',
                    { className: 'grid2' },
                    button('+ Start', 'btn', function () { addNode('start'); }),
                    button('+ End', 'btn', function () { addNode('end'); }),
                    button('+ Process', 'btn', function () { addNode('process'); }),
                    button('+ Interview', 'btn', function () { addNode('interview'); }),
                    button('+ Decision', 'btn', function () { addNode('decision'); }),
                    button('+ Appeal', 'btn', function () { addNode('appeal'); })
                  ),
                  h('div', { className: 'tiny' }, 'Double-click label to edit (Editing ON). Double-click an edge to delete it.')
                ),

                h(
                  'div',
                  { className: 'section' },
                  h('h3', null, '🔐 Selection tools'),
                  h('div', { className: 'hint' }, 'Selected: ', h('b', null, selectedNodeId || 'None')),
                  h(
                    'div',
                    { className: 'grid3' },
                    button('Process', 'btn', function () { setKindForSelected('process'); }, !selectedNodeId || !editable),
                    button('Interview', 'btn', function () { setKindForSelected('interview'); }, !selectedNodeId || !editable),
                    button('Decision', 'btn', function () { setKindForSelected('decision'); }, !selectedNodeId || !editable),
                    button('Appeal', 'btn', function () { setKindForSelected('appeal'); }, !selectedNodeId || !editable),
                    button('Start', 'btn', function () { setKindForSelected('start'); }, !selectedNodeId || !editable),
                    button('End', 'btn', function () { setKindForSelected('end'); }, !selectedNodeId || !editable)
                  ),
                  h('div', { style: { marginTop: 10 } },
                    button('Delete Selected', 'btn danger', deleteSelected, !selectedNodeId || !editable)
                  )
                )
              ),

              h(
                'div',
                { className: 'right' },
                h(
                  'div',
                  { className: 'canvasWrap' },
                  h(
                    ReactFlowComp,
                    {
                      nodes: nodes,
                      edges: edges,
                      nodeTypes: nodeTypes,
                      onNodesChange: onNodesChange,
                      onEdgesChange: onEdgesChange,
                      onConnect: editable ? onConnect : undefined,
                      onSelectionChange: onSelectionChange,
                      nodesConnectable: editable,
                      nodesDraggable: editable,
                      elementsSelectable: editable,
                      fitView: true,
                      defaultEdgeOptions: { type: 'smoothstep' },
                      onEdgeDoubleClick: function (evt, edge) {
                        if (!editable) return;
                        setEdges(function (eds) { return eds.filter(function (e) { return e.id !== edge.id; }); });
                      },
                    },
                    h(MiniMap, { pannable: true, zoomable: true }),
                    h(Controls, null),
                    h(Background, { gap: 18, color: '#e2e8f0' })
                  )
                )
              )
            )
          );
        }

        function Root() {
          return h(ReactFlowProvider, null, h(App, null));
        }

        // Render
        var rootEl = document.getElementById('root');
        if (ReactDOM.createRoot) {
          ReactDOM.createRoot(rootEl).render(h(Root, null));
        } else {
          ReactDOM.render(h(Root, null), rootEl);
        }
      }

      window.addEventListener('load', boot);
    })();
  </script>
</body>
</html>
